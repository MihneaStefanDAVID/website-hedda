# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: MihneaStefanDAVID/website-hedda
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/b7fb301c-778a-4e0f-9ac8-71af1175165e/pkce
  auth_token_endpoint: /sites/b7fb301c-778a-4e0f-9ac8-71af1175165e/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://heddaoprea.com

# When the admin is opened from localhost, Decap automatically talks to
# a local proxy server instead of the backend above — run `npm run
# cms:local` (decap-server) alongside `npm start` to edit content
# locally without touching DecapBridge/production at all.
local_backend: true

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "projects"
    label: "Projects"
    folder: "src/projects"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    sortable_fields: ["order", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Order"
        name: "order"
        widget: "number"
        value_type: "int"
        default: 0
        hint: "Controls left-to-right / grid position on the main page. Lower numbers come first — the first 4 become the animated hero cards."
      - { label: "Cover Image", name: "cover", widget: "image" }
      - label: "Content Blocks"
        name: "blocks"
        widget: "list"
        hint: "Add as many blocks as you like, in any order — Image Group for one or more photos together, Text for a paragraph."
        types:
          - label: "Image Group"
            name: "image_group"
            widget: "object"
            summary: "{{fields.images}} image(s)"
            fields:
              - label: "Images"
                name: "images"
                widget: "list"
                field: { label: "Image", name: "image", widget: "image" }
          - label: "Text"
            name: "text"
            widget: "object"
            summary: "{{fields.body}}"
            fields:
              - { label: "Body", name: "body", widget: "markdown" }
