# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: MihneaStefanDAVID/website-hedda
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/b7fb301c-778a-4e0f-9ac8-71af1175165e/pkce
  auth_token_endpoint: /sites/b7fb301c-778a-4e0f-9ac8-71af1175165e/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://heddaoprea.com

# When the admin is opened from localhost, Decap automatically talks to
# a local proxy server instead of the backend above — run `npm run
# cms:local` (decap-server) alongside `npm start` to edit content
# locally without touching DecapBridge/production at all.
local_backend: true


# media_folder is relative to the repo root by default in Decap — it must
# point inside src/ so Eleventy's passthrough copy of src/assets actually
# ships uploaded files. public_folder is the URL path they're served at,
# which still resolves correctly since src/assets -> /assets at build time.
media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "projects"
    label: "Projects"
    folder: "src/projects"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    sortable_fields: ["order", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Order"
        name: "order"
        widget: "number"
        value_type: "int"
        default: 0
        hint: "Controls left-to-right / grid position on the main page. Lower numbers come first — the first 4 become the animated hero cards."
      - { label: "Cover Image", name: "cover", widget: "image" }
      - label: "Content Blocks"
        name: "blocks"
        widget: "content_blocks"
        hint: "Add as many blocks as you like, in any order — Image Group for one or more photos together (choose how they sit on the page), Text for a paragraph, Image + Text to place a photo and a paragraph side by side."
        types:
          - label: "Image Group"
            name: "image_group"
            widget: "object"
            summary: "{{fields.layout}} — {{fields.images}} image(s)"
            fields:
              - label: "Layout"
                name: "layout"
                widget: "select"
                options: ["Full width", "Left", "Right", "Center"]
                default: "Full width"
                required: false
                hint: "Full width spans the whole page; Left/Right/Center show the photo(s) narrower and positioned to that side."
              - label: "Images"
                name: "images"
                widget: "list"
                field: { label: "Image", name: "image", widget: "image" }
                max: 6
                hint: "Up to 6 photos in one row. Need more? Add another Image Group block below."
          - label: "Text"
            name: "text"
            widget: "object"
            summary: "{{fields.align}} — {{fields.body}}"
            fields:
              - label: "Align"
                name: "align"
                widget: "select"
                options: ["Left", "Center", "Right"]
                default: "Left"
                required: false
                hint: "Where the paragraph sits on the page."
              - { label: "Body", name: "body", widget: "markdown" }
          - label: "Image + Text"
            name: "image_text"
            widget: "object"
            summary: "{{fields.position}} — {{fields.body}}"
            fields:
              - label: "Image Position"
                name: "position"
                widget: "select"
                options: ["Left", "Right"]
                default: "Left"
                required: false
                hint: "Which side the photo sits on; the text fills the other side. Stacks (photo on top) on narrow/mobile screens."
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Text", name: "body", widget: "markdown" }
