# --------------------------------------------------------------------
# Production backend: replace this block with the exact snippet
# generated by the DecapBridge dashboard after registering this site
# there (see the setup notes handed off alongside this migration).
# Left as git-gateway for now so this file is valid before that step.
# --------------------------------------------------------------------
backend:
  name: git-gateway
  branch: main

# When the admin is opened from localhost, Decap automatically talks to
# a local proxy server instead of the backend above — run `npm run
# cms:local` (decap-server) alongside `npm start` to edit content
# locally before anything is wired up to DecapBridge/production.
local_backend: true

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "projects"
    label: "Projects"
    folder: "src/projects"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    sortable_fields: ["order", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Order"
        name: "order"
        widget: "number"
        value_type: "int"
        default: 0
        hint: "Controls left-to-right / grid position on the main page. Lower numbers come first — the first 4 become the animated hero cards."
      - { label: "Cover Image", name: "cover", widget: "image" }
      - label: "Content Blocks"
        name: "blocks"
        widget: "list"
        hint: "Add as many blocks as you like, in any order — Image Group for one or more photos together, Text for a paragraph."
        types:
          - label: "Image Group"
            name: "image_group"
            widget: "object"
            summary: "{{fields.images}} image(s)"
            fields:
              - label: "Images"
                name: "images"
                widget: "list"
                field: { label: "Image", name: "image", widget: "image" }
          - label: "Text"
            name: "text"
            widget: "object"
            summary: "{{fields.body}}"
            fields:
              - { label: "Body", name: "body", widget: "markdown" }
